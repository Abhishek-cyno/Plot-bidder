<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plot Bid Logger</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>Plot Bid Logger</h1>
          <p>Simple editable table with user and time tracking.</p>
        </div>

        <div class="header-controls">
          <button id="showAllDataButton" type="button" class="secondary">Show All Bids</button>
          <label class="user-picker">
            Active user
            <select id="activeUser"></select>
          </label>
        </div>
      </header>

      <section class="panel">
        <div class="panel-title">
          <h2>Current Entries</h2>
          <div class="actions">
            <button id="refreshButton" type="button">Refresh</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Plot ID</th>
                <th>Details</th>
                <th>Bid Amount</th>
                <th>User</th>
                <th>Log Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bidTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Add Entry</h2>
        <form id="addBidForm" class="form">
          <label>
            Plot ID
            <input id="plotId" name="plotId" type="text" required />
          </label>

          <label>
            Details
            <input id="details" name="details" type="text" required />
          </label>

          <label>
            Bid Amount
            <input id="bidAmount" name="bidAmount" type="number" min="0" step="0.01" required />
          </label>

          <button type="submit">Add Data</button>
        </form>
      </section>

      <section class="logs-section">
        <button id="toggleLogsButton" type="button" class="secondary">Show Logs</button>
        <div id="logs" class="logs hidden"></div>
      </section>

      <p id="message" class="message" role="status"></p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
